# Legal_AI — Docker Compose（示例）
# 在仓库根目录执行：docker compose -f deploy/docker-compose.yml --env-file /opt/legal-ai/.env up -d
# 或先 cd deploy 再调整下方路径。默认假设 compose 从 deploy/ 目录启动，context 指向仓库根。

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: legal-ai-backend
    restart: unless-stopped
    env_file:
      - /opt/legal-ai/.env
    volumes:
      - /opt/legal-ai/data:/app/data
      - /opt/legal-ai/LegalData:/opt/legal-ai/LegalData
      - /opt/legal-ai/logs:/app/logs
    expose:
      - "8000"
    networks:
      - legal-ai-net

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    container_name: legal-ai-frontend
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - legal-ai-net

  nginx:
    image: nginx:1.26-alpine
    container_name: legal-ai-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ./deploy/nginx.conf.example:/etc/nginx/conf.d/default.conf:ro
    networks:
      - legal-ai-net

networks:
  legal-ai-net:
    driver: bridge
